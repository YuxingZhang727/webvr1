<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Marble Starter</title>
  <style>
    body {
      margin: 0;
    }

    canvas {
      touch-action: none;
    }
    #audio-toggle {
      position: fixed;
      top: 16px;
      left: 140px;
      z-index: 10;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>

<body>
  <button id="audio-toggle" type="button">Play Audio</button>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0/+esm",
        "@sparkjsdev/spark": "./spark.module.min.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { SparkRenderer, SplatMesh, SparkControls, SparkXr, dyno, utils } from "@sparkjsdev/spark";
    import GUI from "lil-gui";

    const RENDER_TIMEOUT_MS = 5 * 1000;
    const URL_BASE = ".";

    const scene = new THREE.Scene();
    // scene.background = new THREE.Color(0.75, 1.0, 1.0);
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Make a local frame of reference that we can move to control
    // the camera, or as a frame of reference in WebXR mode
    const localFrame = new THREE.Group();
    scene.add(localFrame);

    // Lower the splat rendering width to sqrt(5) std devs for more performance
    const spark = new SparkRenderer({
      renderer,
      maxStdDev: 2,
    });
    scene.add(spark);
    localFrame.add(camera);

    const stats = new Stats();
    document.body.appendChild(stats.dom);

    const gui = new GUI({ title: "Settings" });
    const toggleButton = document.getElementById("audio-toggle");
    const listener = new THREE.AudioListener();
    camera.add(listener);
    const audioLoader = new THREE.AudioLoader();
    const positionalAudios = [];
    let currentMainSplat = null;
    let pizzaBoxModel = null;
    let isTransitioning = false;
    let transitionState = null;
    const revealAnimateT = dyno.dynoFloat(0);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const scene_json = await fetch(`${URL_BASE}/scene.json`).then((response) => response.json());
    const splats = scene_json.splats ?? [];
    const meshes = scene_json.meshes ?? [];

    // Load splats
    for (const splat of splats) {
      const splatMesh = new SplatMesh({ url: `${URL_BASE}/${splat.filename}`, lod: true });
      splatMesh.position.fromArray(splat.transform?.translation ?? [0, 0, 0]);
      splatMesh.quaternion.fromArray(splat.transform?.quaternion ?? [0, 0, 0, 1]);
      const scale = splat.transform?.scale ?? 1;
      splatMesh.scale.set(scale, scale, scale);
      scene.add(splatMesh);

      if (!currentMainSplat) {
        currentMainSplat = splatMesh;
      }
    }

    // Helper to extract albedo color and texture from any material
    function extractAlbedoProperties(material) {
      let color = new THREE.Color(0x888888);
      let map = null;

      if (material.color instanceof THREE.Color) {
        color = material.color.clone();
      }
      if (material.map) {
        map = material.map;
      }

      return { color, map };
    }

    // Convert mesh materials to MeshBasicMaterial (matches Marble's behavior)
    function convertToBasicMaterials(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          const originalMaterial = child.material;
          const originalMaterials = Array.isArray(originalMaterial)
            ? originalMaterial
            : [originalMaterial];

          if (originalMaterials.length === 0) {
            child.material = new THREE.MeshBasicMaterial({
              color: 0x888888,
              side: THREE.DoubleSide,
            });
          } else {
            const newMaterials = originalMaterials.map((mat) => {
              const { color, map } = extractAlbedoProperties(mat);
              return new THREE.MeshBasicMaterial({
                color: color,
                map: map,
                side: THREE.DoubleSide,
              });
            });

            child.material = newMaterials.length === 1 ? newMaterials[0] : newMaterials;
          }
        }
      });
    }

    // Load meshes (GLB/GLTF)
    async function attachPositionalAudio(model, url, volume = 0.8) {
      const audio = new THREE.PositionalAudio(listener);
      audio.setRefDistance(1.4);
      audio.setMaxDistance(14);
      audio.setRolloffFactor(1.3);
      audio.setDistanceModel("linear");
      audio.setLoop(true);
      audio.setVolume(volume);

      const buffer = await audioLoader.loadAsync(url);
      audio.setBuffer(buffer);
      model.add(audio);
      positionalAudios.push(audio);
      window.currentAudio = audio;
    }
    const gltfLoader = new GLTFLoader();
    for (const mesh of meshes) {
      try {
        const gltf = await gltfLoader.loadAsync(`${URL_BASE}/${mesh.filename}`);
        const model = gltf.scene;
        // Convert to MeshBasicMaterial to not need lighting
        convertToBasicMaterials(model);

        model.position.fromArray(mesh.transform?.translation ?? [0, 0, 0]);
        model.quaternion.fromArray(mesh.transform?.quaternion ?? [0, 0, 0, 1]);
        const meshScale = mesh.transform?.scale ?? [1, 1, 1];
        model.scale.set(meshScale[0], meshScale[1], meshScale[2]);
        scene.add(model);

        if (mesh.filename.includes("pizzabox")) {
          pizzaBoxModel = model;
          await attachPositionalAudio(model, `${URL_BASE}/audio/eat.mp3`, 0.8);
        }
      } catch (error) {
        console.warn(`Failed to load mesh: ${mesh.filename}`, error);
      }
    }

    window.THREE = THREE;
    window.scene = scene;
    window.renderer = renderer;

    window.addEventListener("resize", onWindowResize, false);
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function applyRevealEffectToSplat(splatMesh) {
      splatMesh.objectModifier = dyno.dynoBlock(
        { gsplat: dyno.Gsplat },
        { gsplat: dyno.Gsplat },
        ({ gsplat }) => {
          const d = new dyno.Dyno({
            inTypes: { gsplat: dyno.Gsplat, t: "float" },
            outTypes: { gsplat: dyno.Gsplat },
            globals: () => [
              dyno.unindent(`
                vec3 hash(vec3 p) {
                  p = fract(p * 0.3183099 + 0.1);
                  p *= 17.0;
                  return fract(vec3(p.x * p.y * p.z, p.x + p.y * p.z, p.x * p.y + p.z));
                }

                vec3 noise(vec3 p) {
                  vec3 i = floor(p);
                  vec3 f = fract(p);
                  f = f * f * (3.0 - 2.0 * f);

                  vec3 n000 = hash(i + vec3(0,0,0));
                  vec3 n100 = hash(i + vec3(1,0,0));
                  vec3 n010 = hash(i + vec3(0,1,0));
                  vec3 n110 = hash(i + vec3(1,1,0));
                  vec3 n001 = hash(i + vec3(0,0,1));
                  vec3 n101 = hash(i + vec3(1,0,1));
                  vec3 n011 = hash(i + vec3(0,1,1));
                  vec3 n111 = hash(i + vec3(1,1,1));

                  vec3 x0 = mix(n000, n100, f.x);
                  vec3 x1 = mix(n010, n110, f.x);
                  vec3 x2 = mix(n001, n101, f.x);
                  vec3 x3 = mix(n011, n111, f.x);

                  vec3 y0 = mix(x0, x1, f.y);
                  vec3 y1 = mix(x2, x3, f.y);

                  return mix(y0, y1, f.z);
                }
              `),
            ],
            statements: ({ inputs, outputs }) => dyno.unindentLines(`
              ${outputs.gsplat} = ${inputs.gsplat};
              float t = ${inputs.t};
              float s = smoothstep(0.0, 10.0, t - 4.5) * 10.0;
              vec3 scales = ${inputs.gsplat}.scales;
              vec3 localPos = ${inputs.gsplat}.center;
              float l = length(localPos.xz);
              float border = abs(s - l - 0.5);
              localPos *= 1.0 - 0.2 * exp(-20.0 * border);
              vec3 finalScales = mix(scales, vec3(0.002), smoothstep(s - 0.5, s, l + 0.5));
              ${outputs.gsplat}.center = localPos + 0.1 * noise(localPos.xyz * 2.0 + t * 0.5) * smoothstep(s - 0.5, s, l + 0.5);
              ${outputs.gsplat}.scales = finalScales;
              float at = atan(localPos.x, localPos.z) / 3.1416;
              ${outputs.gsplat}.rgba *= step(at, t - 3.1416);
              ${outputs.gsplat}.rgba += exp(-20.0 * border) + exp(-50.0 * abs(t - at - 3.1416)) * 0.5;
            `),
          });

          gsplat = d.apply({
            gsplat,
            t: revealAnimateT,
          }).gsplat;

          return { gsplat };
        }
      );

      splatMesh.updateGenerator();
    }

    async function startSplatRevealTransition(newUrl) {
      if (!currentMainSplat || isTransitioning) {
        return;
      }

      isTransitioning = true;

            const nextSplat = new SplatMesh({
        url: newUrl,
        lod: true,
      });

      if (newUrl.includes("pizzashop.spz")) {
        applyRevealEffectToSplat(nextSplat);
      }

      nextSplat.position.copy(currentMainSplat.position);
      nextSplat.quaternion.copy(currentMainSplat.quaternion);
      nextSplat.scale.copy(currentMainSplat.scale);
      nextSplat.opacity = 1.0;
      nextSplat.visible = false;

      scene.add(nextSplat);

      await nextSplat.loaded;
      nextSplat.visible = true;
      revealAnimateT.value = 0;
      nextSplat.updateVersion();

      transitionState = {
        from: currentMainSplat,
        to: nextSplat,
        fromBaseScale: currentMainSplat.scale.clone(),
        toBaseScale: nextSplat.scale.clone(),
        startTime: performance.now(),
        revealStartTime: performance.now(),
        duration: 5200,
      };
    }

    let renderEnabled = true;
    let lastMoved = 0;
    let lastPos = new THREE.Vector3().setScalar(Number.NEGATIVE_INFINITY);
    let lastDir = new THREE.Vector3();

    const controls = new SparkControls({
      canvas: renderer.domElement,
    });
    controls.pointerControls.reverseRotate = utils.isMobile();
    gui.add(controls.pointerControls, "reverseRotate").name("Reverse look").listen();
    controls.pointerControls.rotateSpeed *= 2.0;
    controls.pointerControls.slideSpeed *= 0.75;

    const xr = new SparkXr({
      renderer,
      onMouseLeaveOpacity: 0.5,
      onReady: async (supported) => {
        console.log(`SparkXr initialized: XR ${supported ? "supported" : "not supported"}`);
      },
      onEnterXr: () => {
        console.log("Enter XR");
      },
      onExitXr: () => {
        console.log("Exit XR");
      },
      // enableHands: true,
      controllers: {
        // moveHeading: true,
      },
    });

    // localFrame.add(xr.makeJointSplats(SparkXr.Hand.left));
    // localFrame.add(xr.makeJointSplats(SparkXr.Hand.right));

    let lastTime = 0;

    // gui.add({ disableRender: () => {
    //   renderEnabled = false;
    //   console.log("Render disabled");
    // } }, "disableRender").name("Disable render");

    gui.add(spark, "lodSplatScale", 0.001, 3.0, 0.001);

    toggleButton.addEventListener("click", async () => {
      await listener.context.resume();

      if (positionalAudios.length === 0) {
        return;
      }

      const anyPlaying = positionalAudios.some((audio) => audio.isPlaying);
      for (const audio of positionalAudios) {
        if (anyPlaying) {
          audio.pause();
        } else {
          audio.setVolume(0.8);
          audio.play();
        }
      }

      toggleButton.textContent = anyPlaying ? "Play Eating Sound" : "Pause Eating Sound";
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "\\") {
        const cameraPos = camera.getWorldPosition(new THREE.Vector3());
        const cameraQuat = camera.getWorldQuaternion(new THREE.Quaternion());
        console.log("camera position: ", JSON.stringify(cameraPos.toArray()), "quaternion: ", JSON.stringify(cameraQuat.toArray()));
      }
    });

    renderer.domElement.addEventListener("click", async (event) => {
      if (!pizzaBoxModel || isTransitioning) {
        return;
      }

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hits = raycaster.intersectObject(pizzaBoxModel, true);
      if (hits.length > 0) {
        await startSplatRevealTransition(`${URL_BASE}/splats/pizzashop.spz`);
      }
    });

    renderer.setAnimationLoop(function animate(time, xrFrame) {
      stats.begin();

      const deltaTime = time - (lastTime || time);
      lastTime = time;

      xr.updateControllers(camera);
      controls.update(localFrame, camera);

      const now = performance.now();
      const dir = localFrame.getWorldDirection(new THREE.Vector3());
      if ((localFrame.position.distanceTo(lastPos) > 0.0001) || (dir.dot(lastDir) < 0.9999)) {
        lastMoved = now;
        if (!renderEnabled) {
          console.log("Render enabled");
        }
        renderEnabled = true;
        lastPos.copy(localFrame.position);
        lastDir.copy(dir);
      }
      if ((now - lastMoved) > RENDER_TIMEOUT_MS) {
        if (renderEnabled) {
          console.log("Render disabled");
        }
        renderEnabled = false;
      }

      if (transitionState) {
        const { from, to, fromBaseScale, toBaseScale, startTime, revealStartTime, duration } = transitionState;
        const nowTransition = performance.now();
        const t = Math.min((nowTransition - startTime) / duration, 1);
        const eased = t * t * (3 - 2 * t);
        revealAnimateT.value = Math.max(0, (nowTransition - revealStartTime) / 320);
        to.updateVersion();

        from.opacity = 1.0 - eased;
        from.scale.copy(fromBaseScale).multiplyScalar(1.0 - 0.03 * eased);

        to.opacity = 1.0;
        to.scale.copy(toBaseScale);

        if (t >= 1) {
          scene.remove(from);
          currentMainSplat = to;
          transitionState = null;
          isTransitioning = false;

          currentMainSplat.opacity = 1.0;
          currentMainSplat.scale.copy(toBaseScale);

          // Keep the reveal shader in its fully revealed state.
          // Setting it back to 0 makes the splats collapse/hide again
          // the next time the scene updates (for example after mouse movement).
          revealAnimateT.value = 16.0;
          currentMainSplat.updateVersion();
        }
      }

      if (renderEnabled || transitionState) {
        renderer.render(scene, camera);
      }

      stats.end();
    });
    toggleButton.textContent = "Play Eating Sound";
  </script>
</body>

</html>
